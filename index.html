<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>감정 카드 맞추기</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>감정 카드 맞추기</h1>
    <div class="header-right">
      <div class="stats">이동 횟수: <span id="move-count">0</span></div>
      <button id="mode-btn">🎨 색깔 모드</button>
      <button id="restart-btn">다시 시작</button>
    </div>
  </header>

  <main>
    <div class="card-grid" id="card-grid">
      <!-- 20 cards generated by game.js -->
    </div>
  </main>

  <div id="win-modal" class="hidden">
    <div class="modal-box">
      <h2>완성!</h2>
      <p>이동 횟수: <span id="final-moves">0</span></p>
      <button id="play-again-btn">다시 시작</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
